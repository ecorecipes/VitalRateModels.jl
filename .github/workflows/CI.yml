name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1.11', '1']
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: VitalRateModels.jl
      - uses: actions/checkout@v4
        with:
          repository: ecorecipes/ProjectionModels.jl
          path: StructuredPopulationCore.jl
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
        with:
          project: VitalRateModels.jl
      - uses: julia-actions/julia-runtest@v1
        with:
          project: VitalRateModels.jl
