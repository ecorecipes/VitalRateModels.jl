name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1.11', '1']
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: VitalRateModels.jl
      - uses: actions/checkout@v4
        with:
          repository: ecorecipes/StructuredPopulationCore.jl
          path: StructuredPopulationCore.jl
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
        with:
          project: VitalRateModels.jl
      - uses: julia-actions/julia-runtest@v1
        with:
          project: VitalRateModels.jl
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: VitalRateModels.jl
      - uses: actions/checkout@v4
        with:
          repository: ecorecipes/StructuredPopulationCore.jl
          path: StructuredPopulationCore.jl
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install dependencies
        run: |
          julia --project=VitalRateModels.jl/docs -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path="StructuredPopulationCore.jl"),
              PackageSpec(path="VitalRateModels.jl"),
            ])
            Pkg.instantiate()'
      - name: Build and deploy docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=VitalRateModels.jl/docs VitalRateModels.jl/docs/make.jl
